name: 采集并部署

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0:00（北京时间 8:00）
  workflow_dispatch:        # 支持手动触发

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          npm install
          pip install -r scripts/requirements.txt

      - name: 采集新闻
        run: |
          python3 scripts/fetch_news.py
          python3 scripts/update_sidebar.py
          python3 scripts/generate_feed.py

      - name: 提交新内容
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "auto: 更新资讯 $(date +%Y-%m-%d)"
          git push

      - name: 构建网站
        run: npm run build

      - name: 检查构建输出
        run: |
          echo "构建输出目录内容："
          ls -la docs/.vitepress/dist/
          echo "检查index.html是否存在："
          if [ -f docs/.vitepress/dist/index.html ]; then
            echo "index.html存在"
          else
            echo "index.html不存在"
            exit 1
          fi
          echo "检查gh-pages分支："
          git branch -a | grep gh-pages || echo "gh-pages分支不存在"

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages